name: CI

on:
  push:
    branches:
      - main
    tags:
      # stable versions
      - "v[0-9]+.[0-9]+.[0-9]+"
      # pre-releases (e.g. v0.2.0-alpha)
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: lint + test / Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node:
          - "22"
          - "24"

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test + coverage
        run: npm run coverage

  # Publishes to npm on tag push (v*). Gates on the test job first.
  # Tokenless via npm Trusted Publishing (OIDC): with id-token:write and a
  # Trusted Publisher configured on npmjs.com for this repo + workflow, npm
  # exchanges the GitHub OIDC token for a short-lived publish credential and
  # attaches build provenance automatically. No NPM_TOKEN secret is used.
  publish:
    name: publish to npm
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted Publishing needs npm >= 11.5.1; Node 22 ships npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci

      # Skip if this exact version is already on npm — avoids a red run when a tag
      # is re-pushed (e.g. after a re-pointed release tag).
      - name: Skip if version already published
        id: check
        run: |
          VERSION="${GITHUB_REF##*/v}"
          if npm view "node-red-contrib-bosch-camera@${VERSION}" version >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Version ${VERSION} already on npm — skipping publish."
          else
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # prepublishOnly (lint + test) runs automatically as part of `npm publish`.
      # Prerelease versions (X.Y.Z-foo) go to the `alpha` dist-tag; stable versions
      # publish to `latest`. No NODE_AUTH_TOKEN — OIDC supplies the credential.
      - name: Publish
        if: steps.check.outputs.publish == 'true'
        run: |
          VERSION="${GITHUB_REF##*/v}"
          case "$VERSION" in
            *-*) echo "Publishing prerelease ${VERSION} (dist-tag: alpha)"; npm publish --tag alpha ;;
            *)   echo "Publishing stable ${VERSION} (dist-tag: latest)"; npm publish ;;
          esac

  release:
    name: Publish GitHub Release
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${GITHUB_REF##*/v}"
          # VERSION passed to awk via -v (never interpolated into the program
          # text) — the ref name is attacker-influenceable via the tag name,
          # so string interpolation there would be an awk/command-injection
          # vector. index() is a literal substring match, not a regex.
          awk -v ver="$VERSION" '
            index($0, "## [" ver "]") == 1 { flag=1; next }
            /^## / { flag=0 }
            flag { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if ! grep -q '[^[:space:]]' /tmp/release-notes.md; then
            echo "::error::No CHANGELOG.md entry found for ${VERSION} — add a '## [${VERSION}]' section before tagging."
            exit 1
          fi
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          TITLE="${TAG#v}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes-file /tmp/release-notes.md
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TITLE" --notes-file /tmp/release-notes.md
          fi
