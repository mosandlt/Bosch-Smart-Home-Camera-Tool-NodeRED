<script type="text/javascript">
    RED.nodes.registerType('bosch-camera-config', {
        category: 'config',
        defaults: {
            name: { value: '', required: false }
        },
        credentials: {
            refreshToken: { type: 'password' }
        },
        label: function () {
            return this.name || 'Bosch Cloud';
        }
    });
</script>

<script type="text/html" data-template-name="bosch-camera-config">
    <div class="form-row">
        <label for="node-config-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-config-input-name" placeholder="My Bosch Cloud">
    </div>
    <div class="form-row">
        <label for="node-config-input-refreshToken"><i class="fa fa-key"></i> Refresh Token</label>
        <input type="password" id="node-config-input-refreshToken" placeholder="Bosch SingleKey ID refresh token">
    </div>
</script>

<script type="text/html" data-help-name="bosch-camera-config">
    <p>Shared Bosch Smart Home <b>cloud</b> credentials for the camera nodes.</p>
    <p>This node stores a Bosch SingleKey ID <b>refresh token</b> (securely, via
    Node-RED's credentials API — never exported to <code>flows.json</code>) and
    exchanges it for short-lived access tokens used by the event, snapshot and
    privacy nodes.</p>
    <h3>Obtaining a refresh token</h3>
    <p>Run the Bosch Camera <b>Python CLI</b> once to log in via the browser
    (PKCE), then copy the <code>refresh_token</code> it saves to its local config
    file into the field above. The refresh token does not expire, so this is a
    one-time step.</p>
</script>
