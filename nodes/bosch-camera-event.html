<script type="text/javascript">
    RED.nodes.registerType('bosch-camera-event', {
        category: 'Bosch Camera',
        color: '#a6bbcf',
        defaults: {
            name:     { value: '' },
            server:   { value: '', type: 'bosch-camera-config', required: true },
            cameraId: { value: '', required: true },
            limit:    { value: 5, validate: RED.validators.number() },
            interval: { value: 30, validate: RED.validators.number() }
        },
        inputs: 0,
        outputs: 1,
        icon: 'camera.svg',
        label: function () {
            return this.name || 'bosch camera event';
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : '';
        }
    });
</script>

<script type="text/html" data-template-name="bosch-camera-event">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Bosch Cloud</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-cameraId"><i class="fa fa-video-camera"></i> Camera ID</label>
        <input type="text" id="node-input-cameraId" placeholder="video input ID">
    </div>
    <div class="form-row">
        <label for="node-input-limit"><i class="fa fa-list-ol"></i> Limit</label>
        <input type="number" id="node-input-limit" placeholder="5" style="width:90px">
        <span style="margin-left:6px;font-size:0.85em;color:#888">events fetched per poll</span>
    </div>
    <div class="form-row">
        <label for="node-input-interval"><i class="fa fa-clock-o"></i> Interval</label>
        <input type="number" id="node-input-interval" placeholder="30" style="width:90px">
        <span style="margin-left:6px;font-size:0.85em;color:#888">seconds between polls (min 10)</span>
    </div>
</script>

<script type="text/html" data-help-name="bosch-camera-event">
    <p>Polls the Bosch cloud for camera events and emits a message for each new one.</p>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload.cam <span class="property-type">string</span></dt>
        <dd>Camera (video input) ID</dd>
        <dt>payload.event_type <span class="property-type">string</span></dt>
        <dd>Event type reported by Bosch, e.g. <code>PERSON</code>, <code>MOTION</code></dd>
        <dt>payload.timestamp <span class="property-type">string</span></dt>
        <dd>ISO 8601 timestamp of the event</dd>
        <dt>payload.image_url / payload.clip_url <span class="property-type">string</span></dt>
        <dd>Cloud URLs for the event snapshot / video clip (require a bearer token)</dd>
        <dt>payload.raw <span class="property-type">object</span></dt>
        <dd>The full event object from the API</dd>
    </dl>
    <h3>Details</h3>
    <p>The first poll after (re)start only establishes a baseline — existing events
    are recorded but not emitted, so a restart never replays history. After that,
    each new event is emitted once (tracked by id). The interval is clamped to a
    minimum of 10 seconds.</p>
</script>
