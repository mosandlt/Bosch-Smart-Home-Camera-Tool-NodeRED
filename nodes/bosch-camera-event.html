<script type="text/javascript">
    RED.nodes.registerType('bosch-camera-event', {
        category: 'Bosch Camera',
        color: '#a6bbcf',
        defaults: {
            name:       { value: '' },
            server:     { value: '', type: 'bosch-camera-config', required: true },
            cameraId:   { value: '', required: false },
            eventTypes: { value: ['MOTION_DETECTED', 'ALARM', 'PERSON_DETECTED'] }
        },
        inputs: 0,
        outputs: 1,
        icon: 'camera.svg',
        label: function () {
            return this.name || 'bosch camera event';
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : '';
        }
    });
</script>

<script type="text/html" data-template-name="bosch-camera-event">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> SHC Config</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-cameraId"><i class="fa fa-video-camera"></i> Camera ID</label>
        <input type="text" id="node-input-cameraId" placeholder="hdm:Cameras:XXXXXXXX-... (leave blank = all cameras)">
    </div>
    <div class="form-row">
        <label><i class="fa fa-filter"></i> Event Types</label>
        <p style="font-size:0.85em;color:#888;margin:4px 0 0 0">
            Phase 2: configurable filter. Currently passes all:
            MOTION_DETECTED, ALARM, PERSON_DETECTED, AUDIO_ALARM
        </p>
    </div>
</script>

<script type="text/html" data-help-name="bosch-camera-event">
    <p>Emits a message whenever a Bosch Smart Home Camera fires an event.</p>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload.cam <span class="property-type">string</span></dt>
        <dd>Camera device ID from the SHC (e.g. <code>hdm:Cameras:EF791764-...</code>)</dd>
        <dt>payload.event_type <span class="property-type">string</span></dt>
        <dd>One of: <code>MOTION_DETECTED</code>, <code>ALARM</code>, <code>PERSON_DETECTED</code>, <code>AUDIO_ALARM</code></dd>
        <dt>payload.timestamp <span class="property-type">string</span></dt>
        <dd>ISO 8601 timestamp of the event</dd>
    </dl>
    <h3>Status</h3>
    <p><strong>Phase 2 — not yet functional.</strong> SSE/long-poll subscription will be added in the next release.</p>
</script>
