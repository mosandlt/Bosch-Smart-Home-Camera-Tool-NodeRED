<script type="text/javascript">
    RED.nodes.registerType('bosch-camera-privacy', {
        category: 'Bosch Camera',
        color: '#a6bbcf',
        defaults: {
            name:        { value: '' },
            server:      { value: '', type: 'bosch-camera-config', required: true },
            cameraId:    { value: '', required: false },
            defaultMode: { value: 'msg' }  // 'on' | 'off' | 'toggle' | 'msg'
        },
        inputs: 1,
        outputs: 1,
        icon: 'camera.svg',
        label: function () {
            return this.name || 'bosch privacy';
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : '';
        }
    });
</script>

<script type="text/html" data-template-name="bosch-camera-privacy">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> SHC Config</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-cameraId"><i class="fa fa-video-camera"></i> Camera ID</label>
        <input type="text" id="node-input-cameraId" placeholder="hdm:Cameras:XXXXXXXX-... (leave blank = msg.cameraId)">
    </div>
    <div class="form-row">
        <label for="node-input-defaultMode"><i class="fa fa-eye-slash"></i> Mode</label>
        <select id="node-input-defaultMode">
            <option value="msg">Use msg.payload (true/false/'on'/'off')</option>
            <option value="on">Always enable privacy</option>
            <option value="off">Always disable privacy</option>
            <option value="toggle">Toggle (Phase 2)</option>
        </select>
    </div>
</script>

<script type="text/html" data-help-name="bosch-camera-privacy">
    <p>Enables or disables privacy mode on a Bosch Smart Home Camera.</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">payload <span class="property-type">boolean | string</span></dt>
        <dd>When Mode is set to <i>Use msg.payload</i>: <code>true</code>/<code>'on'</code>/<code>1</code> to enable, <code>false</code>/<code>'off'</code>/<code>0</code> to disable.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload.cam <span class="property-type">string</span></dt>
        <dd>Camera device ID</dd>
        <dt>payload.privacy <span class="property-type">boolean</span></dt>
        <dd>Requested privacy state</dd>
        <dt>payload.success <span class="property-type">boolean</span></dt>
        <dd>Whether the API call succeeded</dd>
    </dl>
    <h3>Status</h3>
    <p><strong>Phase 2 — not yet functional.</strong> HTTP PUT to SHC will be added in the next release.</p>
</script>
