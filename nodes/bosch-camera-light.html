<script type="text/javascript">
    RED.nodes.registerType('bosch-camera-light', {
        category: 'Bosch Camera',
        color: '#a6bbcf',
        defaults: {
            name:     { value: '' },
            server:   { value: '', type: 'bosch-camera-config', required: true },
            cameraId: { value: '', required: false },
            mode:     { value: 'get' }
        },
        inputs: 1,
        outputs: 1,
        icon: 'light.svg',
        label: function () {
            return this.name || 'bosch light';
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : '';
        }
    });
</script>

<script type="text/html" data-template-name="bosch-camera-light">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-server"><i class="fa fa-server"></i> Bosch Cloud</label>
        <input type="text" id="node-input-server">
    </div>
    <div class="form-row">
        <label for="node-input-cameraId"><i class="fa fa-video-camera"></i> Camera ID</label>
        <input type="text" id="node-input-cameraId" placeholder="video input ID (leave blank = msg.cameraId)">
    </div>
    <div class="form-row">
        <label for="node-input-mode"><i class="fa fa-lightbulb-o"></i> Mode</label>
        <select id="node-input-mode">
            <option value="get">Read current light state</option>
            <option value="front-on">Turn front light ON</option>
            <option value="front-off">Turn front light OFF</option>
            <option value="wallwasher-on">Turn wallwasher ON</option>
            <option value="wallwasher-off">Turn wallwasher OFF</option>
            <option value="msg">Use msg.payload as patch (frontLightOn / wallwasherOn / frontLightIntensity)</option>
        </select>
    </div>
</script>

<script type="text/html" data-help-name="bosch-camera-light">
    <p>Reads or sets the front-illuminator / wallwasher light state on a Bosch Eyes Outdoor camera (LED-light models only).</p>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt class="optional">payload <span class="property-type">object</span></dt>
        <dd>When Mode is <i>Use msg.payload as patch</i>: a partial state object, e.g. <code>{ "frontLightOn": true, "frontLightIntensity": 0.6 }</code>. Only the given fields change (read-modify-write); <code>frontLightIntensity</code> is a 0.0-1.0 fraction, not a percentage.</dd>
    </dl>
    <h3>Outputs</h3>
    <dl class="message-properties">
        <dt>payload.cam <span class="property-type">string</span></dt>
        <dd>Camera device ID</dd>
        <dt>payload.frontLightOn <span class="property-type">boolean</span></dt>
        <dt>payload.wallwasherOn <span class="property-type">boolean</span></dt>
        <dt>payload.frontLightIntensity <span class="property-type">number|null</span></dt>
        <dt>payload.success <span class="property-type">boolean</span></dt>
    </dl>
    <h3>Details</h3>
    <p>Setting <code>frontLightIntensity</code> implicitly turns the front light on (Bosch-side behaviour). Wallwasher is cloud-write-only — there is no LAN/RCP fallback.</p>
</script>
